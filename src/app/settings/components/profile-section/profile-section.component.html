<ion-card>
  <ion-card-header>
    <ion-card-title>{{ 'PROFILE.TITLE' | translate }}</ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <form (ngSubmit)="onSubmit()" [formGroup]="profileForm">
      <ion-item *ngIf="profileForm.get('avatar')?.value">
        <ion-avatar slot="start">
          <img [src]="profileForm.get('avatar')?.value" alt="Avatar">
        </ion-avatar>
      </ion-item>
      <ion-item>
        <ion-label position="floating">{{ 'PROFILE.AVATAR_URL' | translate }}</ion-label>
        <ion-input formControlName="avatar" type="url"></ion-input>
      </ion-item>
      <ion-item>
        <ion-label position="floating">{{ 'PROFILE.NAME' | translate }}</ion-label>
        <ion-input formControlName="name" type="text"></ion-input>
      </ion-item>
      <ion-item>
        <ion-label position="floating">{{ 'PROFILE.EMAIL' | translate }}</ion-label>
        <ion-input formControlName="email" type="email"></ion-input>
      </ion-item>
      <ion-button [disabled]="profileForm.invalid" expand="full" type="submit">{{ 'PROFILE.SAVE' | translate }}</ion-button>
    </form>
  </ion-card-content>
</ion-card>
