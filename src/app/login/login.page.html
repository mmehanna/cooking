<ion-content [fullscreen]="true" [scrollY]="false" [forceOverscroll]="false">
  <div class="page-bg"></div>

  <div class="login-hero">
    <img src="assets/images/login/hero-food.jpg" alt="Delicious food" class="hero-image">
    <div class="hero-overlay"></div>
    <div class="hero-brand">
      Atepla
      <span class="hero-tagline">{{ 'LOGIN.HERO_SUBTITLE' | translate }}</span>
    </div>
  </div>

  <div class="login-container">
    <div class="login-logo-wrap">
      <img src="assets/images/logo.jpeg" alt="Logo" class="login-logo">
    </div>

    <div class="login-icons-row">
      <ion-icon name="restaurant-outline" class="deco-icon"></ion-icon>
      <ion-icon name="fast-food-outline" class="deco-icon"></ion-icon>
      <ion-icon name="cafe-outline" class="deco-icon"></ion-icon>
    </div>

    <div class="login-card">
      <h2 class="card-title">{{ 'LOGIN.TITLE' | translate }}</h2>

      <form (ngSubmit)="onSubmit()" [formGroup]="loginForm">
        <ion-item lines="none" class="input-item">
          <ion-icon name="mail-outline" slot="start" color="primary"></ion-icon>
          <ion-label position="floating">{{ 'LOGIN.EMAIL' | translate }}</ion-label>
          <ion-input formControlName="email" type="email"></ion-input>
        </ion-item>
        <ion-item lines="none" class="input-item">
          <ion-icon name="lock-closed-outline" slot="start" color="primary"></ion-icon>
          <ion-label position="floating">{{ 'LOGIN.PASSWORD' | translate }}</ion-label>
          <ion-input formControlName="password" type="password"></ion-input>
        </ion-item>
        <ion-button [disabled]="loginForm.invalid" expand="full" type="submit" class="login-btn">
          <ion-icon name="log-in-outline" slot="start"></ion-icon>
          {{ 'LOGIN.SUBMIT' | translate }}
        </ion-button>
      </form>

      <div class="register-link">
        <ion-icon name="person-add-outline" size="small" color="primary"></ion-icon>
        <a routerLink="/register">{{ 'LOGIN.NOT_REGISTERED' | translate }}</a>
      </div>
    </div>
  </div>
</ion-content>
